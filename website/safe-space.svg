<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Safe space / privacy icon - shield with warmth -->
  <defs>
    <linearGradient id="shield-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7A8B6F"/>
      <stop offset="100%" stop-color="#5C6B4F"/>
    </linearGradient>
  </defs>
  <!-- Shield shape - rounded, soft, not corporate -->
  <path d="M40 8 Q18 16 14 28 Q12 44 20 56 Q28 68 40 74 Q52 68 60 56 Q68 44 66 28 Q62 16 40 8Z" 
        fill="url(#shield-grad)" opacity="0.15" stroke="#7A8B6F" stroke-width="1.5"/>
