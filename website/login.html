<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Masii</title>
    <meta name="description" content="Sign in to your Masii account.">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/styles.css">

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪷</text></svg>">

    <!-- Supabase JS - loaded before body -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" crossorigin="anonymous"></script>
</head>
<body>

    <!-- Terminal header -->
    <div class="terminal-header">
        <div class="line"><span class="highlight">masii</span> is online</div>
        <div class="line">sign in to continue</div>
    </div>

    <!-- Navigation -->
    <nav class="nav">
        <a href="index.html" class="nav-logo">Masii</a>
        <div class="nav-links">
            <a href="about.html">About</a>
            <a href="signup.html">Sign Up</a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content" style="max-width: 480px; margin: 80px auto; padding: 0 20px;">
        <h1 style="font-family: 'Instrument Serif', serif; font-size: 2.5rem; margin-bottom: 1rem;">Welcome Back</h1>
        <p style="color: #888; margin-bottom: 2rem;">Sign in to continue your journey.</p>

        <form id="login-form" style="display: flex; flex-direction: column; gap: 1.5rem;">
            <div>
                <label for="email" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Email</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    required 
                    autocomplete="email"
                    style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px;"
                    placeholder="you@example.com"
                />
            </div>

            <div>
                <label for="password" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    required 
                    autocomplete="current-password"
                    style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px;"
                    placeholder="Your password"
                />
            </div>

            <div id="error-message" style="color: #e74c3c; display: none; padding: 12px; background: #fee; border-radius: 6px; font-size: 14px;"></div>

            <button 
                type="submit" 
                id="submit-btn"
                style="padding: 14px; background: #FF6B35; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s;"
            >
                Sign In
            </button>
        </form>

        <p style="text-align: center; margin-top: 2rem; color: #888;">
            Don't have an account? <a href="signup.html" style="color: #FF6B35; text-decoration: none;">Sign up</a>
        </p>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Initialize Supabase
            const SUPABASE_URL = 'https://herqdldjaxmfusjjpwdg.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhlcnFkbGRqYXhtZnVzampwd2RnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA3MzQ3NzcsImV4cCI6MjA4NjMxMDc3N30.IJF22gilascdOyI4gRFZMyI5PJjwuHAODSlcHxsZ7g4';
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            const form = document.getElementById('login-form');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const submitBtn = document.getElementById('submit-btn');
        const errorMsg = document.getElementById('error-message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            // Clear previous messages
            errorMsg.style.display = 'none';

            // Disable submit button
            submitBtn.disabled = true;
            submitBtn.textContent = 'Signing in...';

            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email,
                    password
                });

                if (error) throw error;
                
                // Redirect to onboarding
                window.location.href = '/onboarding.html';
            } catch (error) {
                console.error('Login error:', error);
                errorMsg.textContent = error.message || 'Sign in failed. Please check your credentials.';
                errorMsg.style.display = 'block';
                
                submitBtn.disabled = false;
                submitBtn.textContent = 'Sign In';
            }
        });
        });
    </script>

</body>
</html>
