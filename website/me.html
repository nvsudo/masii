<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Masii</title>
    <link rel="stylesheet" href="/css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/auth.js"></script>
    <style>
        .dashboard-container {
            max-width: 600px;
            margin: 4rem auto;
            padding: 0 1rem;
        }

        .dashboard-card {
            background: var(--white);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 2px 12px rgba(61, 43, 31, 0.08);
            margin-bottom: 2rem;
        }

        .status-badge {
            display: inline-block;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 1rem;
        }

        .status-draft {
            background: var(--haldi-soft);
            color: var(--earth);
        }

        .status-submitted {
            background: var(--blush);
            color: var(--earth);
        }

        .status-processed {
            background: var(--sage);
            color: white;
        }

        .dashboard-heading {
            font-family: var(--font-display);
            font-size: 2rem;
            color: var(--earth);
            margin-bottom: 1rem;
        }

        .dashboard-message {
            color: var(--earth-medium);
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .cta-button {
            display: inline-block;
            padding: 1rem 2rem;
            background: var(--terracotta);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }

        .cta-button:hover {
            background: var(--terracotta-soft);
            transform: translateY(-1px);
        }

        .secondary-button {
            display: inline-block;
            padding: 1rem 2rem;
            background: transparent;
            color: var(--terracotta);
            text-decoration: none;
            border-radius: 8px;
            border: 1px solid var(--terracotta);
            font-weight: 500;
            transition: all 0.2s;
            cursor: pointer;
            font-size: 1rem;
            margin-left: 1rem;
        }

        .secondary-button:hover {
            background: var(--blush);
        }

        .loader {
            text-align: center;
            padding: 4rem;
            color: var(--earth-medium);
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div id="loader" class="loader">
            <p>Loading your profile...</p>
        </div>
        
        <div id="dashboard" style="display: none;">
            <div class="dashboard-card">
                <div id="status-badge"></div>
                <h1 class="dashboard-heading" id="greeting"></h1>
                <div class="dashboard-message" id="message"></div>
                <div id="actions"></div>
            </div>
            
            <div class="dashboard-card">
                <button class="secondary-button" onclick="window.signOut()">Sign Out</button>
            </div>
        </div>
        
        <div id="error" style="display: none;">
            <div class="dashboard-card">
                <div class="error-message" id="error-message"></div>
                <button class="cta-button" onclick="location.href='/form.html'">Start Form</button>
                <button class="secondary-button" onclick="window.signOut()">Sign Out</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.hostname === "localhost"
            ? "http://localhost:8080"
            : "https://masii-bot.fly.dev";

        async function loadDashboard() {
            try {
                // Check authentication
                const user = await window.getUser();
                if (!user) {
                    window.location.href = '/login.html';
                    return;
                }

                // Fetch draft/submission status
                const response = await fetch(`${API_BASE}/api/draft?user_id=${user.id}`);
                
                if (response.status === 404) {
                    // No submission yet - redirect to form
                    window.location.href = '/form.html';
                    return;
                }

                if (!response.ok) {
                    throw new Error('Failed to load profile');
                }

                const data = await response.json();
                renderDashboard(data, user);

            } catch (error) {
                console.error('Dashboard error:', error);
                showError(error.message);
            }
        }

        function renderDashboard(data, user) {
            const { status, current_question, submission_data } = data;
            
            document.getElementById('loader').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';

            // Extract name from submission data
            const name = submission_data?.preferred_name || 
                        submission_data?.name || 
                        user.email.split('@')[0];

            // Status badge
            let badgeClass = 'status-draft';
            let badgeText = 'Draft';

            if (status === 'submitted') {
                badgeClass = 'status-submitted';
                badgeText = 'Under Review';
            } else if (status === 'processed') {
                badgeClass = 'status-processed';
                badgeText = 'Active';
            }

            document.getElementById('status-badge').innerHTML = 
                `<span class="status-badge ${badgeClass}">${badgeText}</span>`;

            // Greeting
            document.getElementById('greeting').textContent = `Hey ${name} 👋`;

            // Message and CTA based on status
            const messageEl = document.getElementById('message');
            const actionsEl = document.getElementById('actions');

            if (status === 'draft') {
                messageEl.innerHTML = `
                    <p>You started your profile but haven't submitted it yet.</p>
                    <p>Pick up where you left off — takes about 5 more minutes.</p>
                `;
                actionsEl.innerHTML = `
                    <a href="/form.html" class="cta-button">Continue where I left off →</a>
                `;
            } else if (status === 'submitted') {
                messageEl.innerHTML = `
                    <p>Your profile is with Masii. She's reviewing your answers and looking for potential matches.</p>
                    <p>This usually takes 1-2 days. You'll get an email when she's ready.</p>
                    <p>In the meantime, if you want to update anything:</p>
                `;
                actionsEl.innerHTML = `
                    <a href="/form.html?mode=edit" class="secondary-button">Edit my answers</a>
                `;
            } else if (status === 'processed') {
                messageEl.innerHTML = `
                    <p>You're active on Masii! Your profile is live and Masii is looking for great matches.</p>
                    <p>You'll hear from her when she finds someone worth introducing.</p>
                    <p>Want to update your profile?</p>
                `;
                actionsEl.innerHTML = `
                    <a href="/form.html?mode=edit" class="secondary-button">Edit profile</a>
                `;
            }
        }

        function showError(message) {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            document.getElementById('error-message').textContent = message;
        }

        // Load dashboard on page load
        window.addEventListener('DOMContentLoaded', loadDashboard);
    </script>
</body>
</html>
