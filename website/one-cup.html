<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masii ☕ — Get Started</title>
    <meta name="description" content="Tell Masii about yourself. 60+ questions, save and come back. She finds your person.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&family=Caveat:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪷</text></svg>">

    <style>
        :root {
            --cream: #FDF6EE; --cream-deep: #F5EBD9; --terracotta: #C4653A; --terracotta-soft: #D4845E;
            --terracotta-glow: rgba(196,101,58,0.08); --haldi: #D4A03C; --haldi-soft: #E8C876;
            --earth: #3D2B1F; --earth-medium: #5C4033; --earth-light: #8B7355;
            --sage: #7A8B6F; --blush: #E8CFC0; --white: #FFFDF9;
            --font-display: 'Playfair Display', 'Georgia', serif;
            --font-body: 'DM Sans', -apple-system, sans-serif;
            --font-hand: 'Caveat', cursive;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { font-size: 16px; scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
        body { font-family: var(--font-body); color: var(--earth); background: var(--cream); line-height: 1.7; }
        body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E"); pointer-events: none; z-index: 0; }
        ::selection { background: var(--terracotta); color: var(--white); }
        a { color: var(--terracotta); text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* NAV */
        .nav { display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.5rem; position: sticky; top: 0; z-index: 100; background: rgba(253,246,238,0.92); backdrop-filter: blur(12px); }
        .nav-logo { font-family: var(--font-display); font-size: 1.6rem; font-weight: 500; color: var(--earth); text-decoration: none; }
        .nav-links { display: flex; gap: 1.5rem; list-style: none; align-items: center; }
        .nav-links a { font-size: 0.88rem; color: var(--earth-light); font-weight: 500; text-decoration: none; }
        .nav-links a:hover { color: var(--terracotta); text-decoration: none; }
        .nav-toggle { display: none; background: none; border: none; cursor: pointer; }
        .nav-toggle span { display: block; width: 22px; height: 2px; background: var(--earth); margin: 5px 0; border-radius: 2px; }

        .container { max-width: 680px; margin: 0 auto; padding: 0 1.5rem; position: relative; z-index: 1; }

        /* HERO */
        .hero { min-height: calc(100vh - 120px); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; position: relative; z-index: 1; padding: 2rem 1.5rem; }
        .hero .eyebrow { font-family: var(--font-hand); font-size: 1.3rem; color: var(--terracotta); margin-bottom: 0.5rem; }
        .hero h1 { font-family: var(--font-display); font-size: clamp(2rem, 5vw, 2.8rem); font-weight: 400; margin-bottom: 0.8rem; line-height: 1.2; }
        .hero h1 em { font-style: italic; color: var(--terracotta); }
        .hero .subtitle { max-width: 500px; margin: 0 auto 1.5rem; color: var(--earth-medium); font-size: 1.05rem; line-height: 1.8; }

        /* BUTTONS */
        .btn-primary { display: inline-flex; align-items: center; gap: 8px; background: var(--terracotta); color: var(--white); padding: 16px 36px; border-radius: 32px; font-size: 1.05rem; font-weight: 500; font-family: var(--font-body); transition: all 0.3s; text-decoration: none; box-shadow: 0 4px 20px rgba(196,101,58,0.25); }
        .btn-primary:hover { background: var(--haldi); color: var(--earth); text-decoration: none; }

        /* REASSURANCE */
        .reassurance { font-family: var(--font-hand); font-size: 1rem; color: var(--earth-light); margin-top: 1rem; }

        footer { padding: 1.5rem 0; border-top: 1px solid var(--blush); position: relative; z-index: 1; }
        .container-wide { max-width: 960px; margin: 0 auto; padding: 0 1.5rem; }
        .footer-content { display: flex; justify-content: space-between; align-items: center; }
        .footer-content span { font-family: var(--font-hand); font-size: 0.95rem; color: var(--earth-light); }
        .footer-links { display: flex; gap: 1.5rem; list-style: none; }
        .footer-links a { font-size: 0.82rem; color: var(--earth-light); text-decoration: none; }
        .footer-links a:hover { color: var(--terracotta); }

        @media (max-width: 768px) {
            .nav-toggle { display: block; }
            .nav-links { display: none; position: fixed; top: 57px; left: 0; width: 100%; background: var(--cream); flex-direction: column; padding: 2rem; gap: 1.5rem; z-index: 999; }
            .nav-links.active { display: flex; }
            .hero { min-height: calc(100vh - 100px); padding: 1.5rem 1rem; }
            .footer-content { flex-direction: column; gap: 0.5rem; text-align: center; }
        }
    </style>
</head>
<body>

    <div id="site-nav"></div>
    <script src="js/components.js"></script>

    <!-- HERO -->
    <section class="hero">
        <p class="eyebrow">☕ One cup with Masii</p>
        <h1>Tell her about yourself.<br>She'll find <em>your person.</em></h1>
        <p class="subtitle">60+ questions. Save and come back. No credit card.</p>
        <a href="form.html" class="btn-primary">Let's get started</a>
        <p class="reassurance">Takes about 10 minutes · Free to start</p>
    </section>

    <div id="site-footer"></div>

</body>
</html>
