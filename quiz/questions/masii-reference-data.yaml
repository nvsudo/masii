# ═══════════════════════════════════════════════════════════════
# Masii — Reference Data (v3)
# ═══════════════════════════════════════════════════════════════
#
# Dynamic option lists referenced by masii-questions.yaml.
# This file is the SINGLE SOURCE for all dropdown/select options
# that are conditional on prior answers (state, religion, gender,
# location).
#
# masii-questions.yaml references these by key name, e.g.:
#   options: castes_by_religion_and_state
#   options: income_by_location
#   options: countries
#
# The generator script resolves these at build time.
#
# Last updated: March 2026 (v3)
# ═══════════════════════════════════════════════════════════════


