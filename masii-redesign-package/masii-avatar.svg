<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Masii avatar - warm, approachable auntie silhouette with lotus -->
  <defs>
    <linearGradient id="avatar-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDF6EE"/>
      <stop offset="100%" stop-color="#F5EBD9"/>
    </linearGradient>
    <linearGradient id="saree-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C4653A"/>
      <stop offset="60%" stop-color="#D4845E"/>
      <stop offset="100%" stop-color="#E8CFC0"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="60" cy="60" r="56" fill="url(#avatar-bg)" stroke="#E8CFC0" stroke-width="1.5"/>
  <!-- Decorative border -->
  <circle cx="60" cy="60" r="52" fill="none" stroke="#D4A03C" stroke-width="0.5" stroke-dasharray="2 4" opacity="0.4"/>
  <!-- Hair/head -->
  <ellipse cx="60" cy="38" rx="18" ry="20" fill="#3D2B1F" opacity="0.8"/>
  <!-- Face -->
  <ellipse cx="60" cy="42" rx="14" ry="16" fill="#D4845E" opacity="0.9"/>
  <!-- Bindi -->
  <circle cx="60" cy="36" r="2" fill="#C4653A"/>
  <!-- Eyes - warm, kind -->
  <ellipse cx="54" cy="41" rx="2.5" ry="1.5" fill="#3D2B1F" opacity="0.7"/>
  <ellipse cx="66" cy="41" rx="2.5" ry="1.5" fill="#3D2B1F" opacity="0.7"/>
  <!-- Gentle smile -->
  <path d="M54 48 Q60 54 66 48" fill="none" stroke="#3D2B1F" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <!-- Saree/body -->
  <path d="M32 70 Q40 58 60 56 Q80 58 88 70 L90 100 Q60 96 30 100 Z" fill="url(#saree-grad)" opacity="0.8"/>
  <!-- Dupatta/pallu -->
  <path d="M42 62 Q50 56 60 56 Q55 64 48 72 Q42 78 38 82" fill="#D4A03C" opacity="0.4" stroke="#D4A03C" stroke-width="0.5"/>
  <!-- Small lotus in hand area -->
  <ellipse cx="72" cy="78" rx="4" ry="8" fill="#C4653A" opacity="0.4" transform="rotate(-15 72 78)"/>
  <ellipse cx="72" cy="78" rx="4" ry="8" fill="#C4653A" opacity="0.3" transform="rotate(15 72 78)"/>
  <circle cx="72" cy="82" r="2" fill="#D4A03C" opacity="0.5"/>
</svg>
