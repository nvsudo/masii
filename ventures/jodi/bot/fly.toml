# Fly.io Configuration - JODI Bot Staging
app = "jodi-bot-staging"
primary_region = "bom"  # Mumbai, close to Supabase AP South 1

[build]
  [build.args]

[env]
  PORT = "8080"
  APP_ENV = "staging"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "10s"
    grace_period = "30s"
    method = "GET"
    path = "/health"
    protocol = "http"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
