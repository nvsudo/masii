  <path d="M40 16 Q24 22 22 32 Q20 44 26 52 Q32 60 40 64 Q48 60 54 52 Q60 44 58 32 Q56 22 40 16Z" 
        fill="none" stroke="#7A8B6F" stroke-width="1" opacity="0.4" stroke-dasharray="3 3"/>
  <!-- Heart inside -->
  <path d="M40 48 L32 40 Q28 34 34 32 Q38 30 40 34 Q42 30 46 32 Q52 34 48 40 Z" 
        fill="#C4653A" opacity="0.7"/>
  <!-- Small lock element -->
  <rect x="36" y="52" width="8" height="6" rx="1" fill="#3D2B1F" opacity="0.3"/>
  <path d="M38 52 L38 49 Q38 46 40 46 Q42 46 42 49 L42 52" fill="none" stroke="#3D2B1F" stroke-width="1" opacity="0.3"/>
</svg>
