# ═══════════════════════════════════════════════════════════════
# Masii — Question Flow Source of Truth (v3)
# ═══════════════════════════════════════════════════════════════
#
# This file is the SINGLE SOURCE OF TRUTH.
# Do NOT edit form-config.js, question-flow.md, or matching protocol
# directly. Edit this file, then generate outputs:
#
#   node scripts/generate-form-config.js   → form-config.js
#   node scripts/generate-spec.js          → question-flow.md
#   node scripts/generate-matching.js      → question_matching_protocol.md
#
# Last updated: March 2026 (v3)
# ═══════════════════════════════════════════════════════════════

meta:
  version: 3
  updated: "2026-03"
  total_estimated_clicks:
    male: 75
    female: 75
  auto_save: per_section  # Wave 3
  brand_colors_applied: false  # Wave 3

# ═══════════════════════════════════════════════════════════════
# GLOBAL CONFIG
# ═══════════════════════════════════════════════════════════════

global:
  # State-first architecture: raised_in_state drives downstream
  state_context_fields:
    - caste_community       # Q12: caste list sorted by state
    - pref_caste_exclude    # Q14a: exclude list sorted by state
    - mother_tongue         # Q4: auto-suggest based on state
    - annual_income         # Q19: metro/non-metro tiers
    - diet                  # Q29: default suggestion

  # Complexion policy
  complexion: photo_only  # Masii does not ask about complexion. Photos speak.

  # Column layout rule
  column_thresholds:
    8: 2     # 8-12 options → 2 columns
    13: 3    # 13-18 options → 3 columns
    19: 4    # 19+ options → 3-4 columns or searchable dropdown

  # Name personalization
  name_field: preferred_name  # All {name} references use this

# ═══════════════════════════════════════════════════════════════
# INTRO
# ═══════════════════════════════════════════════════════════════

intro:
  screens: 1
  text: |
    This takes about 10 minutes.

    I'll ask about your life, your values, your
    family, and what you're looking for.

    Be honest — the better I know you,
    the better the match.

    Everything stays between us.
  button: "Let's go →"
  note: "Service info is on the homepage. This intro is form-focused only."

# ═══════════════════════════════════════════════════════════════
# SECTIONS (phases)
# ═══════════════════════════════════════════════════════════════

sections:
  setup:
    label: "Setup"
    subtitle: "Intent, Name, Gender"
    transition: null  # No transition for setup

  basics:
    label: "Basics"
    subtitle: "Parichay"
    transition: "{name}, let's start simple. The stuff any masi would ask first."

  background:
    label: "Background"
    subtitle: "Dharam"
    transition: "{name}, I need to understand where you come from. Not to judge — to find someone who fits."

  partner_bg:
    label: "Partner Background"
    subtitle: "Partner Preferences"
    transition: "Now the other side — what matters to you in their background, {name}?"

  education:
    label: "Education & Career"
    subtitle: "Vidya"
    transition: "Work and education, {name}. What you do and what you studied."

  family:
    label: "Family"
    subtitle: "Parivar"
    transition: "Family. You know this is the part I care about most, {name}."

  lifestyle:
    label: "Lifestyle"
    subtitle: "Jeevan Shaili"
    transition: "How you live, {name}. The everyday stuff that makes or breaks it."

  marriage:
    label: "Marriage & Living"
    subtitle: "Shaadi"
    transition: "The big picture, {name}. What does married life actually look like for you?"

  partner_physical:
    label: "Partner Physical"
    subtitle: "Physical Preferences"
    transition: "A few preferences, {name}. Be honest — I don't judge."

  household:
    label: "Household & Expectations"
    subtitle: "Household"
    transition: "Real talk, {name}. Who cooks. Who cleans. How money works. No right answers — just honest ones."

  sensitive:
    label: "Sensitive"
    subtitle: "Traditional"
    transition: "A few questions that traditional matchmakers ask. If any don't apply, just say 'Prefer not to say.' Your answers are never shared — not even with your match."

  personality:
    label: "Personality"
    subtitle: "Who You Are"
    transition: "Last stretch, {name}. A few about the kind of person you are — not what you do, but how you are."

# ═══════════════════════════════════════════════════════════════
# CLOSE
# ═══════════════════════════════════════════════════════════════

close:
  text: |
    {name}, that's everything. You've been honest, and that's exactly what I need.

    I'm going to work on this. When I find someone worth your time — someone who actually fits — I'll tell you why I think so.

    Sit tight. Good things take a little time.

    — Masii

# ═══════════════════════════════════════════════════════════════
# ERROR MESSAGES
# ═══════════════════════════════════════════════════════════════

errors:
  button_expected: "Just tap one of the options above."
  sticker_during_buttons: "Save that energy — just pick an option for now."
  invalid_input: "That doesn't look right. Please try again."
  network_error: "Something went wrong on my end. Let me try that again."

# ═══════════════════════════════════════════════════════════════
# RESUME
# ═══════════════════════════════════════════════════════════════

resume:
  text: "Hey {name}, we were getting through your profile — want to pick up where we left off?\n\nProgress: {section_name} • {current} of {total} questions"
  buttons: ["Resume", "Start over"]

# ═══════════════════════════════════════════════════════════════
# QUESTIONS
# ═══════════════════════════════════════════════════════════════
#
# Each question has:
#   id:           Unique string identifier (stable across renumbering)
#   section:      Which section/phase it belongs to
#   field:        DB column name
#   db_table:     users | preferences | signals | meta
#   question:     The question text shown to user
#   type:         single_select | multi_select | text_input | phone_input |
#                 location_tree | two_step_date | two_step_range | two_step_same_screen
#   options:      Array of {label, value} OR a reference string for dynamic options
#   columns:      Number of columns for display (optional, for 8+ options)
#   gender:       "Male" | "Female" | null (both)
#   skip_if:      Condition string — if true, skip this question
#   gate:         hard | scored | wow | null
#   gate_logic:   Description of how this question gates matching
#   scoring:      Scoring rules for matching protocol
#   follow_ups:   Array of sub-question IDs that immediately follow this question
#   notes:        Implementation notes
#
# ═══════════════════════════════════════════════════════════════

questions:

  # ──────────────────────────────────────────────────
  # PHASE 0: SETUP
  # ──────────────────────────────────────────────────

  - id: intent
    section: setup
    field: intent
    db_table: meta
    question: "Are you filling this for yourself or someone else?"
    type: single_select
    options:
      - { label: "For myself", value: "self" }
      - { label: "For someone else", value: "proxy" }
    gate: null
    notes: "If 'proxy' → jump to proxy flow"

  - id: full_name
    section: setup
    field: full_name
    db_table: users
    question: "What's your full name?"
    type: text_input
    placeholder: "First and last name"
    gate: null
    notes: "For records only. Not used for personalization."

  - id: preferred_name
    section: setup
    field: preferred_name
    db_table: users
    question: "What should I call you?"
    type: text_input
    placeholder: "e.g. Nik, Priya, Ravi"
    gate: null
    notes: "Used as {name} throughout. Auto-fill first word of full_name."

  - id: gender
    section: setup
    field: gender
    db_table: users
    question: "Are you male or female?"
    type: single_select
    options:
      - { label: "Male", value: "Male" }
      - { label: "Female", value: "Female" }
    helper_text: "More options coming soon — we see you."
    gate: hard
    gate_logic: "Must be opposite gender. Male matches Female only."
    notes: "Gates gendered question variants downstream."

  # ──────────────────────────────────────────────────
  # PHASE 1: BASICS (Parichay)
  # ──────────────────────────────────────────────────

  - id: date_of_birth
    section: basics
    field: date_of_birth
    db_table: users
    question: "When were you born?"
    type: two_step_date
    step1:
      text: "What year were you born?"
      field: birth_year
      options: birth_years  # dynamic: 2006-1970
      columns: 3
    step2:
      text: "Which month?"
      field: birth_month
      options:
        - { label: "January", value: "1" }
        - { label: "February", value: "2" }
        - { label: "March", value: "3" }
        - { label: "April", value: "4" }
        - { label: "May", value: "5" }
        - { label: "June", value: "6" }
        - { label: "July", value: "7" }
        - { label: "August", value: "8" }
        - { label: "September", value: "9" }
        - { label: "October", value: "10" }
        - { label: "November", value: "11" }
        - { label: "December", value: "12" }
      columns: 2
    response_template: "{age} — got it ✓"
    gate: null
    scoring:
      rule: "Age compared against partner's Q40 age range. Within range = 1.0."
      note: "Q40 is a hard gate, so this score is redundant but included for completeness."

  - id: current_location
    section: basics
    field: current_location
    db_table: users
    question: "Where do you live right now?"
    type: location_tree
    step1:
      text: "Where do you live right now?"
      field: location_type
      options:
        - { label: "India", value: "India" }
        - { label: "Outside India", value: "Outside India" }
    step2_india:
      text: "Which state?"
      field: state_india
      options: states_india  # dynamic
      columns: 2
    step2_abroad:
      text: "Which country?"
      field: country_current
      options: countries  # dynamic
      columns: 2
    step3:
      text: "Which city?"
      field: city_current
      type: text_input
      placeholder: "e.g. Mumbai, Dubai, Toronto..."
    gate: null
    scoring:
      rule: "Matched against Q2-pref (hard gate). Pass gate = 1.0."
    notes: "Sets _location_type and _location_country for downstream logic (income brackets, currency)."
    follow_ups: [pref_current_location]

  - id: pref_current_location
    section: basics
    field: pref_current_location
    db_table: preferences
    question: "Where should your partner currently live?"
    type: single_select
    options:
      - { label: "Same city as me", value: "Same city as me" }
      - { label: "Same state as me", value: "Same state as me" }
      - { label: "Same country as me", value: "Same country as me" }
      - { label: "Anywhere", value: "Anywhere" }
      - { label: "Specific countries...", value: "Specific countries", triggers: pref_location_countries }
    gate: hard
    gate_logic: "Candidate's current location (Q2) must match stated preference. 'Anywhere' passes everyone. 'Specific countries' = candidate must be in selected list."
    notes: "Immediately follows Q2."

  - id: raised_in
    section: basics
    field: raised_in
    db_table: users
    question: "Where did you grow up?"
    type: location_tree
    step1:
      text: "Where did you grow up?"
      field: raised_in_type
      options:
        - { label: "India", value: "India" }
        - { label: "Outside India", value: "Outside India" }
    step2_india:
      text: "Which state?"
      field: raised_in_state
      options: states_india_full  # dynamic: all states + UTs
      columns: 2
    step2_abroad:
      text: "Which country?"
      field: raised_in_country
      options: countries  # dynamic
      columns: 2
    step3:
      text: "Which city or town?"
      field: raised_in_city
      type: text_input
      placeholder: "e.g. Ahmedabad, Jaipur, Lucknow..."
    gate: null
    scoring:
      rule: "Matched against Q3-pref (hard gate). Pass gate = 1.0."
    notes: "KEY CONTEXT NODE. raised_in_state drives downstream: caste list, language suggestions, diet defaults, income context."
    follow_ups: [pref_raised_in]

  - id: pref_raised_in
    section: basics
    field: pref_raised_in
    db_table: preferences
    question: "Where should your partner have been raised?"
    type: single_select
    options_conditional:
      if_outside_india:
        - { label: "Same country as me", value: "Same country as me" }
        - { label: "Raised abroad (any country)", value: "Raised abroad (any country)" }
        - { label: "Raised in India is fine too", value: "Raised in India is fine too" }
        - { label: "Doesn't matter", value: "Doesn't matter" }
      if_in_india:
        - { label: "Same state", value: "Same state" }
        - { label: "Nearby states", value: "Nearby states" }
        - { label: "Any state in India", value: "Any state in India" }
        - { label: "Abroad is fine too", value: "Abroad is fine too" }
        - { label: "Doesn't matter", value: "Doesn't matter" }
    gate: hard
    gate_logic: "'Same country' + different country = eliminated. 'Same state' + different state = eliminated. 'Doesn't matter' passes everyone."
    notes: "Options vary by user's location_type."

  - id: mother_tongue
    section: basics
    field: mother_tongue
    db_table: users
    question: "What is your mother tongue?"
    type: single_select
    options:
      - { label: "Hindi", value: "Hindi" }
      - { label: "Gujarati", value: "Gujarati" }
      - { label: "Marathi", value: "Marathi" }
      - { label: "Tamil", value: "Tamil" }
      - { label: "Telugu", value: "Telugu" }
      - { label: "Kannada", value: "Kannada" }
      - { label: "Malayalam", value: "Malayalam" }
      - { label: "Bengali", value: "Bengali" }
      - { label: "Punjabi", value: "Punjabi" }
      - { label: "Urdu", value: "Urdu" }
      - { label: "Odia", value: "Odia" }
      - { label: "Assamese", value: "Assamese" }
      - { label: "Sindhi", value: "Sindhi" }
      - { label: "Konkani", value: "Konkani" }
      - { label: "Tulu", value: "Tulu" }
      - { label: "Rajasthani", value: "Rajasthani" }
      - { label: "Bhojpuri", value: "Bhojpuri" }
      - { label: "Maithili", value: "Maithili" }
      - { label: "Dogri", value: "Dogri" }
      - { label: "Kashmiri", value: "Kashmiri" }
      - { label: "Other", value: "Other" }
    columns: 3
    state_context: "Auto-suggest based on raised_in_state. E.g., Tamil Nadu → Tamil first."
    scoring:
      rule: "Same mother tongue = 1.0. Different but share non-English language (from Q5) = 0.8. Only English in common = 0.5. No shared language = 0.0."
    notes: "Expanded from 16 to 21 languages."

  - id: languages_spoken
    section: basics
    field: languages_spoken
    db_table: users
    question: "What other languages do you speak?"
    type: multi_select
    options: languages_minus_mother_tongue  # dynamic: same list minus their Q4 answer, + English
    columns: 3
    done_label: "Done ✓"
    scoring:
      rule: "Not scored independently. Feeds into mother_tongue scoring (shared language check)."

  - id: marital_status
    section: basics
    field: marital_status
    db_table: users
    question: "What's your current marital status?"
    type: single_select
    options:
      - { label: "Never married", value: "Never married" }
      - { label: "Divorced", value: "Divorced" }
      - { label: "Widowed", value: "Widowed" }
      - { label: "Awaiting divorce", value: "Awaiting divorce" }
    gate: hard
    gate_logic: "Candidate's marital_status must be in partner's accepted list (Q6-pref)."
    follow_ups: [pref_marital_status, children_existing, pref_children_existing]

  - id: pref_marital_status
    section: basics
    field: pref_marital_status
    db_table: preferences
    question: "What marital status are you open to in a partner?"
    type: multi_select
    options:
      - { label: "Never married", value: "Never married" }
      - { label: "Divorced", value: "Divorced" }
      - { label: "Widowed", value: "Widowed" }
      - { label: "Awaiting divorce", value: "Awaiting divorce" }
      - { label: "Any", value: "Any" }
    done_label: "Done ✓"
    gate: hard
    gate_logic: "Candidate's marital_status (Q6) must be in accepted list. 'Any' passes everyone."

  - id: children_existing
    section: basics
    field: children_existing
    db_table: users
    question: "Do you have children?"
    type: single_select
    skip_if: "marital_status == 'Never married'"
    options:
      - { label: "No", value: "No" }
      - { label: "Yes, they live with me", value: "Yes, they live with me" }
      - { label: "Yes, they don't live with me", value: "Yes, they don't live with me" }
    gate: null

  - id: pref_children_existing
    section: basics
    field: pref_children_existing
    db_table: preferences
    question: "Are you open to a partner who has children?"
    type: single_select
    skip_if: "marital_status == 'Never married'"
    options:
      - { label: "Yes", value: "Yes" }
      - { label: "Only if they don't live with them", value: "Only if they don't live with them" }
      - { label: "No", value: "No" }
    gate: hard
    gate_logic: "'No' + candidate has children = eliminated. 'Only if they don't live with them' + kids live with them = eliminated."

  - id: height
    section: basics
    field: height_cm
    db_table: users
    question: "How tall are you?"
    type: single_select
    columns: 2
    options_conditional:
      if_female:
        - { label: "Below 5'2\" (157 cm)", value: "155" }
        - { label: "5'2\" (157 cm)", value: "157" }
        - { label: "5'3\" (160 cm)", value: "160" }
        - { label: "5'4\" (163 cm)", value: "163" }
        - { label: "5'5\" (165 cm)", value: "165" }
        - { label: "5'6\" (168 cm)", value: "168" }
        - { label: "5'7\" (170 cm)", value: "170" }
        - { label: "Above 5'7\" (173 cm)", value: "173" }
      if_male:
        - { label: "Below 5'5\" (165 cm)", value: "163" }
        - { label: "5'5\" (165 cm)", value: "165" }
        - { label: "5'6\" (168 cm)", value: "168" }
        - { label: "5'7\" (170 cm)", value: "170" }
        - { label: "5'8\" (173 cm)", value: "173" }
        - { label: "5'9\" (175 cm)", value: "175" }
        - { label: "5'10\" (178 cm)", value: "178" }
        - { label: "5'11\" (180 cm)", value: "180" }
        - { label: "6'0\" (183 cm)", value: "183" }
        - { label: "6'1\" (185 cm)", value: "185" }
        - { label: "6'2\" (188 cm)", value: "188" }
        - { label: "6'3\" (191 cm)", value: "191" }
        - { label: "Above 6'3\" (193 cm)", value: "193" }
    scoring:
      rule: "Matched via Q41 hard gate. Pass gate = 1.0."

  - id: weight
    section: basics
    field: weight_kg
    db_table: users
    question: "What is your weight?"
    type: single_select
    columns: 2
    options_conditional:
      if_female:
        - { label: "Below 45 kg (99 lbs)", value: "42" }
        - { label: "45-50 kg (99-110 lbs)", value: "47" }
        - { label: "50-55 kg (110-121 lbs)", value: "52" }
        - { label: "55-60 kg (121-132 lbs)", value: "57" }
        - { label: "60-65 kg (132-143 lbs)", value: "62" }
        - { label: "65-70 kg (143-154 lbs)", value: "67" }
        - { label: "70-75 kg (154-165 lbs)", value: "72" }
        - { label: "75-80 kg (165-176 lbs)", value: "77" }
        - { label: "Above 80 kg (176 lbs)", value: "85" }
      if_male:
        - { label: "Below 60 kg (132 lbs)", value: "57" }
        - { label: "60-65 kg (132-143 lbs)", value: "62" }
        - { label: "65-70 kg (143-154 lbs)", value: "67" }
        - { label: "70-75 kg (154-165 lbs)", value: "72" }
        - { label: "75-80 kg (165-176 lbs)", value: "77" }
        - { label: "80-85 kg (176-187 lbs)", value: "82" }
        - { label: "85-90 kg (187-198 lbs)", value: "87" }
        - { label: "90-100 kg (198-220 lbs)", value: "95" }
        - { label: "Above 100 kg (220 lbs)", value: "105" }
    scoring:
      rule: "BMI calculated from height + weight. Same BMI range = 1.0, one step = 0.5, two steps = 0.25, three steps = 0.0."

  # ──────────────────────────────────────────────────
  # PHASE 2: BACKGROUND (Dharam)
  # ──────────────────────────────────────────────────

  - id: religion
    section: background
    field: religion
    db_table: users
    question: "What is your religion?"
    type: single_select
    columns: 2
    options:
      - { label: "Hindu", value: "Hindu" }
      - { label: "Muslim", value: "Muslim" }
      - { label: "Sikh", value: "Sikh" }
      - { label: "Jain", value: "Jain" }
      - { label: "Christian", value: "Christian" }
      - { label: "Buddhist", value: "Buddhist" }
      - { label: "Parsi", value: "Parsi" }
      - { label: "No religion", value: "No religion" }
      - { label: "Other", value: "Other" }
    gate: null
    scoring:
      rule: "Same religion = 1.0. Different = 0.0. Hard gate Q13 handles elimination."
    notes: "Gates downstream: practice, caste, manglik, diet defaults."

  - id: religious_practice
    section: background
    field: religious_practice
    db_table: preferences
    question: "How would you describe your religious practice?"
    type: single_select
    skip_if: "religion in ['Buddhist', 'No religion', 'Other', 'Parsi']"
    options_conditional:
      Hindu:
        - { label: "Very religious — daily puja, regular fasting, temple every week", value: "Very religious" }
        - { label: "Religious — puja most days, major festivals, temple visits", value: "Religious" }
        - { label: "Moderately religious — festivals and family rituals, occasional temple", value: "Moderately religious" }
        - { label: "Not religious — cultural Hindu, don't practice actively", value: "Not religious" }
      Muslim:
        - { label: "Very religious — five daily prayers, Ramadan, regular mosque", value: "Very religious" }
        - { label: "Religious — Friday prayers, Ramadan, Eid celebrations", value: "Religious" }
        - { label: "Moderately religious — Eid and major occasions, occasional prayer", value: "Moderately religious" }
        - { label: "Not religious — cultural Muslim, don't practice actively", value: "Not religious" }
      Sikh:
        - { label: "Very religious (Amritdhari) — Amrit chhaka, 5 Ks, daily Nitnem", value: "Very religious (Amritdhari)" }
        - { label: "Religious (Keshdhari) — unshorn hair, regular Gurdwara, Nitnem", value: "Religious (Keshdhari)" }
        - { label: "Moderate (Sahajdhari) — Gurdwara on occasions, flexible on 5 Ks", value: "Moderate (Sahajdhari)" }
        - { label: "Not religious — cultural Sikh, don't practice actively", value: "Not religious" }
      Jain:
        - { label: "Very religious — strict dietary rules, regular temple, Paryushana fasting", value: "Very religious" }
        - { label: "Religious — temple regularly, dietary discipline, major festivals", value: "Religious" }
        - { label: "Moderately religious — festivals and family rituals, flexible on diet", value: "Moderately religious" }
        - { label: "Not religious — cultural Jain, don't practice actively", value: "Not religious" }
      Christian:
        - { label: "Very religious — church every Sunday, Bible study, active in parish", value: "Very religious" }
        - { label: "Religious — regular church, Christmas/Easter, prayer life", value: "Religious" }
        - { label: "Moderately religious — church on occasions, celebrates festivals", value: "Moderately religious" }
        - { label: "Not religious — cultural Christian, don't practice actively", value: "Not religious" }
    scoring:
      rule: "Same practice level = 1.0. One step apart = 0.5. Two steps = 0.25. Opposite ends = 0.0."
      note: "Scored independently from religion. Two 'not religious' people of different faiths can match well."

  - id: caste_community
    section: background
    field: caste_community
    db_table: preferences
    question: "What is your caste or community?"
    type: single_select
    columns: 3
    skip_if: "religion in ['Muslim', 'Christian', 'Buddhist', 'Parsi', 'No religion', 'Other']"
    options: castes_by_religion_and_state  # dynamic: state-contextualized
    state_context: "Top castes for raised_in_state shown first, then remaining for religion, then Other / Prefer not to say."
    scoring:
      rule: "Scoring driven by caste_importance (Q12a)."
